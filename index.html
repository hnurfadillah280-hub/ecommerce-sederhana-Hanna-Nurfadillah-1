<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Senja Coffee</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f4ece1; color: #4a342e; }
        .container { display: flex; flex-wrap: wrap; justify-content: center; padding: 20px; }
        .card { 
            background: white; border-radius: 15px; margin: 15px; width: 250px; 
            box-shadow: 0 4px 8px rgba(0,0,0,0.1); overflow: hidden; text-align: center;
        }
        .card img { width: 100%; height: 200px; object-fit: cover; }
        .card-content { padding: 15px; }
        .price { font-weight: bold; color: #8d6e63; font-size: 1.2em; }
        .btn-buy { 
            background: #6d4c41; color: white; border: none; padding: 10px 20px; 
            border-radius: 5px; cursor: pointer; margin-top: 10px;
        }
        .btn-buy:hover { background: #4e342e; }
    </style>
</head>
<body>

<h1 style="text-align: center;">☕ Menu Spesial Senja Coffee</h1>

<div class="container">
    <div class="card">
        <img src="https://images.unsplash.com/photo-1541167760496-1628856ab772?auto=format&fit=crop&w=500&q=80" alt="Senja Klasik">
        <div class="card-content">
            <h3>vanila latte</h3>
            <p class="price">Rp 18.000</p>
            <button class="btn-buy">Tambah ke Keranjang</button>
        </div>
    </div>

    <div class="card">
        <img src="https://images.unsplash.com/photo-1461023058943-07fcbe16d735?auto=format&fit=crop&w=500&q=80" alt="Lembayung Berry">
        <div class="card-content">
            <h3>kopi gula aren</h3>
            <p class="price">Rp 22.000</p>
            <button class="btn-buy">Tambah ke Keranjang</button>
        </div>
    </div>

    <div class="card">
        <img src="https://images.unsplash.com/photo-1572442388796-11668a67e53d?auto=format&fit=crop&w=500&q=80" alt="Midnight Mocha">
        <div class="card-content">
            <h3>Midnight Mocha</h3>
            <p class="price">Rp 25.000</p>
            <button class="btn-buy">Tambah ke Keranjang</button>
        </div>
    </div>

   

</body>
</html>
